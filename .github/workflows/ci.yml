name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall -q app

      - name: Smoke-test FastAPI application
        env:
          DATA_DIR: ${{ runner.temp }}/prosport-data
        run: |
          python - <<'PY'
          from app.main import app, health

          assert app.title == "ProSport API"
          assert health() == {"status": "ok"}
          print("FastAPI smoke test passed")
          PY

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: p03-ecommerce:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container on application port
        run: |
          docker run --detach --name p03-ecommerce-ci \
            --publish 8501:8000 \
            p03-ecommerce:ci

      - name: Check health endpoint on port 8501
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8501/api/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs p03-ecommerce-ci
          exit 1

      - name: Stop test container
        if: always()
        run: docker rm --force p03-ecommerce-ci || true
